<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Booking | Property Booking System</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header>
    <nav class="navbar" aria-label="Primary Navigation">
      <div class="container">
        <ul class="nav-list">
          <li><a href="index.html">Home</a></li>
          <li><a href="about.html">About Us</a></li>
          <li><a href="charts.html">Charts</a></li>
          <li><a class="active" aria-current="page" href="create.html">Create</a></li>
          <li><a href="read.html">Read</a></li>
          <li><a href="update.html">Update</a></li>
          <li><a href="delete.html">Delete</a></li>
          <li><a href="mybot.html">Chatbot</a></li>
        </ul>
      </div>
    </nav>
  </header>

  <main class="container">
    <div class="card">
      <h1>Create a Booking</h1>
      <form id="bookingForm">
        <input type="text" placeholder="Booking ID" id="id" required>
        <input type="text" placeholder="Property Name" id="property" required>
        <input type="text" placeholder="Location" id="location" required>
        <input type="number" placeholder="Price" id="price" required>
        <input type="date" id="date" required>

        <select id="status">
          <option>Confirmed</option>
          <option>Pending</option>
          <option>Cancelled</option>
          <option>Completed</option>
        </select>

        <button type="submit" class="button">Add Booking</button>
      </form>

      <p id="successMessage"></p>
    </div>
  </main>

  <footer>
    <div class="container">
      <p>&copy; 2026 StayEase Rentals</p>
    </div>
  </footer>
  <script src="js/create.js"></script>
</body>
</html>
