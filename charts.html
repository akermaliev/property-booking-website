<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Charts | Property Booking System</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="charts-page">
  <header>
    <nav class="navbar" aria-label="Primary Navigation">
      <div class="container">
        <ul class="nav-list">
          <li><a href="index.html">Home</a></li>
          <li><a href="about.html">About Us</a></li>
          <li><a class="active" aria-current="page" href="charts.html">Charts</a></li>
          <li><a href="create.html">Create</a></li>
          <li><a href="read.html">Read</a></li>
          <li><a href="update.html">Update</a></li>
          <li><a href="delete.html">Delete</a></li>
          <li><a href="mybot.html">Chatbot</a></li>
        </ul>
      </div>
    </nav>
  </header>

  <main class="container">
    <div class="card">
      <h2>Booking Analytics</h2>

      <label for="timeFilter">Filter by Time:</label>
      <select id="timeFilter">
        <option value="6">Last 6 Months</option>
        <option value="12" selected>Last 12 Months</option>
      </select>

      <div class="dashboard">
        <div class="chart-full">
          <div class="chart-wrapper">
            <canvas id="revenueChart"></canvas>
          </div>
        </div>

        <div class="chart-half">
          <div class="chart-wrapper">
            <canvas id="propertyChart"></canvas>
          </div>
        </div>

        <div class="chart-half pie-container">
          <div class="chart-wrapper">
            <canvas id="statusChart"></canvas>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer>
    <div class="container">
      <p>&copy; 2026 StayEase Rentals</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="js/charts.js"></script>
</body>
</html>
